version: 1
product: LocationIQ
description: >
  Predefined input values for purpose-aware location intelligence reports.
  The app should start with location, purpose_category, and sub_purpose,
  then ask only the context fields relevant to that selection.
  Reports should be interpretive, evidence-backed, and non-advisory:
  no final buy/open/invest verdict, no proceed/avoid label, no single overall score,
  and no user-facing source-quality badge system.

report_mode:
  type: interpretive_location_intelligence
  user_owned_decision: true
  final_advice_label_allowed: false
  single_overall_rating_allowed: false
  aspect_signal_indices_allowed: true
  user_facing_source_quality_badges_allowed: false
  source_limits_written_in_language: true
  quantified_evidence_required_where_available: true
  public_web_gold_enabled: true
  pin_conditioned_public_collection_required: true
  partnership_data_bonus_only: true
  blind_scraping_allowed: false

location_input:
