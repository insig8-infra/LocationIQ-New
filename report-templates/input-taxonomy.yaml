aspect_dimensions:
  access_mobility:
    description: Commute, road access, public transport, walkability, parking, last-mile quality.
  market_demand_catchment:
    description: Nearby audience size, audience fit, footfall, resident/worker/student demand.
  competition_complementarity:
    description: Direct competitors, substitutes, complementary anchors, category gaps.
  daily_social_infra:
    description: Grocery, healthcare, education, parks, banks, childcare, local services.
  safety_security:
    description: Lighting, isolation, crime proxies, accident risk, women/night safety.
  civic_reliability:
    description: Water, power, drainage, waste, sewage, road condition, public toilets.
  environment_resilience:
    description: AQI, noise, heat, waterlogging, flood, green cover, climate comfort.
  operations_site_fit:
    description: Observable operating context such as frontage, visibility, loading, parking cues, utilities, and access control. Must not become a physical-suitability conclusion without measured or field data.
  exact_pin_truth:
    description: Exact coordinate handling, reverse geocode, nearest POIs, visual plot envelope, and distinction between selected pin and nearby named places.
  source_data_limits:
    description: Source freshness, spatial precision, repeatability, source agreement, and missing data written naturally into report language.
  lifestyle_audience_fit:
    description: Cultural fit, positioning fit, daypart match, local behavior match.
  future_change:
    description: Metro, road, RERA supply, commercial growth, public works, disruption risk.
  regulatory_light_check:
    description: Only high-level flags such as obvious land-use mismatch, RERA presence, civic restrictions.

